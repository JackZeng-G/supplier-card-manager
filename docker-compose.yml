version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplier-system
    ports:
      - "20030:8080"
    environment:
      - SERVER_PORT=8080
      - DATABASE_PATH=/app/data/suppliers.db
      - TEMP_UPLOAD_PATH=/app/data/uploads
      - IMAGE_PATH=/app/data/images
      - TENCENT_SECRET_ID=？
      - TENCENT_SECRET_KEY=？
    volumes:
      - ./data:/app/data
    network_mode: bridge
    restart: always
