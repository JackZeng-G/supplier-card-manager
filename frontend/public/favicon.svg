<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- 名片轮廓 -->
  <rect x="10" y="14" width="44" height="30" rx="3" fill="none" stroke="url(#card)" stroke-width="2.5" opacity="0.9"/>
  <!-- 头像圆 -->
  <circle cx="22" cy="24" r="4" fill="#14b8a6" opacity="0.8"/>
  <!-- 姓名行 -->
  <rect x="30" y="21" width="18" height="2.5" rx="1" fill="#14b8a6" opacity="0.7"/>
  <!-- 职位行 -->
  <rect x="30" y="26" width="12" height="2" rx="1" fill="#14b8a6" opacity="0.4"/>
  <!-- 联系信息行 -->
  <rect x="16" y="34" width="22" height="2" rx="1" fill="#14b8a6" opacity="0.5"/>
  <rect x="16" y="39" width="16" height="2" rx="1" fill="#14b8a6" opacity="0.35"/>
  <!-- 货船/物流图标 -->
  <g transform="translate(34, 42)" fill="#14b8a6" opacity="0.85">
    <!-- 船体 -->
    <path d="M0,10 L2,4 L18,4 L20,10 Z"/>
    <!-- 集装箱 -->
    <rect x="4" y="0" width="4" height="4" rx="0.5" fill="#14b8a6" opacity="0.6"/>
    <rect x="9" y="0" width="4" height="4" rx="0.5" fill="#14b8a6" opacity="0.6"/>
    <rect x="14" y="0" width="4" height="4" rx="0.5" fill="#14b8a6" opacity="0.6"/>
  </g>
  <!-- 底部波浪线 -->
  <path d="M8,56 Q16,52 24,56 Q32,60 40,56 Q48,52 56,56" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.3"/>
</svg>
